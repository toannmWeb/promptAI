name: Template CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  validate-template:
    name: Validate master prompt-system template
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run full validation
        shell: bash
        run: |
          bash scripts/check-all.sh
